spring.application.name=connect-track-pro-api

# ✅ IMPORTANT (Render / Cloud)
server.port=${PORT:10000}

# ===============================
# DATABASE (Aiven MySQL)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ✅ REQUIRED FOR AIVEN SSL
spring.datasource.hikari.data-source-properties.useSSL=true
spring.datasource.hikari.data-source-properties.requireSSL=true
spring.datasource.hikari.data-source-properties.verifyServerCertificate=false

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ❌ REMOVE THIS (auto-detected)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}

# ===============================
# SWAGGER
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===============================
# MAIL
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# APP CONFIG
# ===============================
app.employee.default-reset-password=welcome123

# ===============================
# FILE STORAGE (TEMP)
# ===============================
file.upload-dir=/tmp/user-uploads/profile-photos

# ===============================
# LOGGING (IMPORTANT FOR DEBUG)
# ===============================
logging.level.org.springframework.security=DEBUG
###############################################################
#  PRODUCTION CONFIG - CLOUD RUN + CLOUD SQL SOCKET FACTORY
###############################################################

server.port=8080
spring.application.name=connect-track-pro-api


###############################################################
#  CLOUD SQL (MySQL 8) - Socket Factory Connection
###############################################################
# Instance connection name:
# connect-track-pro:asia-south1:connect-track-db

spring.datasource.url=jdbc:mysql://google/connect_track_pro_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=connect_track_user
spring.datasource.password=Adgp@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cloud SQL connector
spring.datasource.hikari.data-source-properties.socketFactory=com.google.cloud.sql.mysql.SocketFactory
spring.datasource.hikari.data-source-properties.cloudSqlInstance=connect-track-pro:asia-south1:connect-track-db
spring.datasource.hikari.data-source-properties.ipTypes=PUBLIC


###############################################################
#  HIKARI CONNECTION POOL (PRODUCTION OPTIMIZED)
###############################################################
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000


###############################################################
#  JPA / HIBERNATE
###############################################################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


